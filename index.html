<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nam Truong Thinh Long An Textile Garment Co., Ltd.</title>
    <meta
      name="description"
      content="Nam Truong Thinh Long An provides weaving, dyeing, garment production, and custom fabric manufacturing in Long An, Vietnam with more than 18 years of experience."
    />
    <meta
      name="keywords"
      content="Nam Truong Thinh Long An, textile manufacturer Vietnam, weaving, dyeing, garment production, Long An textile factory"
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nam Truong Thinh Long An Textile Garment Co., Ltd." />
    <meta
      property="og:description"
      content="Weaving, dyeing, garment production, and custom fabric manufacturing in Long An, Vietnam."
    />
    <meta property="og:image" content="assets/images/hero_image.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="favicon.ico" />
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <script type="application/ld+json" id="schema-json"></script>

    <header class="site-header">
      <a href="#top" class="logo-link" data-scroll>
        <img src="assets/images/namtruongthinh-logo.png" alt="Nam Truong Thinh Long An logo" />
      </a>
      <nav class="desktop-nav" aria-label="Main navigation"></nav>
      <div class="header-actions">
        <div class="language-switch" aria-label="Language selector">
          <button type="button" data-lang="en" class="active">EN</button>
          <button type="button" data-lang="vi">VI</button>
        </div>
        <a class="contact-pill" href="mailto:namtruongthinh@gmail.com" data-text="common.contact">
          <span class="mail-icon">✉</span>
          <span class="contact-text">Contact</span>
        </a>
      </div>
    </header>

    <main id="top">
      <section class="hero-section">
        <div class="thread-line"></div>
        <div class="hero-grid">
          <div class="hero-copy cotton-panel">
            <p class="eyebrow" data-text="hero.eyebrow"></p>
            <h1 class="display-title" data-text="hero.title"></h1>
            <p class="hero-description" data-text="hero.description"></p>
            <p class="slogan" data-text="common.slogan"></p>
            <div class="button-row">
              <a href="#capabilities" class="primary-button" data-scroll>
                <span data-text="hero.primaryCta"></span>
                <span>→</span>
              </a>
              <a href="#contact" class="secondary-button" data-scroll data-text="hero.secondaryCta"></a>
            </div>
          </div>
          <div class="image-wrap">
            <div
              class="webgl-image hero-image"
              data-src="assets/images/hero_image.jpg"
              data-alt-key="hero.imageAlt"
            ></div>
            <div class="hero-stats"></div>
          </div>
        </div>
      </section>

      <section id="about" class="section section-light">
        <div class="about-grid">
          <div
            class="webgl-image about-image"
            data-src="assets/images/about_image.jpg"
            data-alt-key="about.imageAlt"
          ></div>
          <div>
            <div class="section-heading">
              <p class="eyebrow" data-text="about.eyebrow"></p>
              <h2 class="display-heading" data-text="about.title"></h2>
            </div>
            <div class="paragraph-stack" data-list="about.paragraphs"></div>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="split-grid">
          <div class="section-heading">
            <p class="eyebrow" data-text="philosophy.eyebrow"></p>
            <h2 class="display-heading" data-text="philosophy.title"></h2>
            <p class="section-body" data-text="philosophy.body"></p>
          </div>
          <div class="cards-grid cards-three" data-cards="philosophy.values"></div>
        </div>
      </section>

      <section class="section history-section">
        <div class="history-grid">
          <div class="history-intro">
            <p class="eyebrow" data-text="history.eyebrow"></p>
            <h2 class="display-heading" data-text="history.title"></h2>
            <p class="section-body" data-text="history.body"></p>
            <div class="history-cards"></div>
          </div>
          <div class="timeline cotton-panel"></div>
        </div>
      </section>

      <section id="capabilities" class="section section-light">
        <div class="section-heading wide-heading">
          <p class="eyebrow" data-text="businessAreas.eyebrow"></p>
          <h2 class="display-heading" data-text="businessAreas.title"></h2>
          <p class="section-body" data-text="businessAreas.body"></p>
        </div>
        <div class="cards-grid cards-four service-grid"></div>
      </section>

      <section class="section">
        <div class="split-grid">
          <div class="section-heading">
            <p class="eyebrow" data-text="capacity.eyebrow"></p>
            <h2 class="display-heading" data-text="capacity.title"></h2>
          </div>
          <div class="metrics-grid"></div>
        </div>
      </section>

      <section id="factory" class="section section-light">
        <div class="factory-grid">
          <div>
            <div class="section-heading">
              <p class="eyebrow" data-text="factory.eyebrow"></p>
              <h2 class="display-heading" data-text="factory.title"></h2>
              <p class="section-body" data-text="factory.body"></p>
            </div>
            <p class="factory-description" data-text="factory.description"></p>
            <div class="factory-stats"></div>
          </div>
          <div
            class="webgl-image factory-image"
            data-src="assets/images/process_image1.jpg"
            data-alt-key="factory.imageAlt"
          ></div>
        </div>
      </section>

      <section id="partners" class="section">
        <div class="split-grid">
          <div class="section-heading">
            <p class="eyebrow" data-text="partners.eyebrow"></p>
            <h2 class="display-heading" data-text="partners.title"></h2>
          </div>
          <div class="partners-grid"></div>
        </div>
      </section>

      <section id="contact" class="section contact-section">
        <div class="contact-panel">
          <div>
            <p class="eyebrow contact-eyebrow" data-text="contact.eyebrow"></p>
            <h2 class="display-heading contact-title" data-text="contact.title"></h2>
            <p class="contact-body" data-text="contact.body"></p>
            <a class="contact-button" href="mailto:namtruongthinh@gmail.com">
              <span data-text="contact.cta"></span>
              <span>→</span>
            </a>
          </div>
          <div class="contact-card">
            <h3 data-text="contact.company"></h3>
            <p><span>⌖</span><span data-text="contact.address"></span></p>
            <p><span>☎</span><span data-text="contact.phone"></span></p>
            <p><span>✉</span><span data-text="contact.email"></span></p>
            <p class="muted" data-text="contact.fax"></p>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p data-text="common.copyright"></p>
      <p data-text="common.slogan"></p>
    </footer>

    <script src="assets/main.js"></script>
  </body>
</html>
